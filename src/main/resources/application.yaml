server:
  port: 8081
spring:
  application:
    name: life-selection-platform
  datasource:
    driver-class-name: com.mysql.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/life_selection?useSSL=false&serverTimezone=UTC
    username: root
    password: 123
  redis:
    host: 127.0.0.1
    port: 6379
    password: 123321
    lettuce:
      pool:
        max-active: 10
        max-idle: 10
        min-idle: 1
        time-between-eviction-runs: 10s
  jackson:
    default-property-inclusion: non_null
  kafka:
    bootstrap-servers: 127.0.0.1:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
    consumer:
      group-id: life-selection-platform
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: earliest
    listener:
      ack-mode: record
platform:
  display-name: "\u751F\u6D3B\u4F18\u9009\u5E73\u53F0"
ai:
  langchain4j:
    enabled: false
    api-key: ""
    base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
    model-name: qwen-plus
mybatis-plus:
  type-aliases-package: com.lifeselection.entity
logging:
  level:
    com.lifeselection: debug
  pattern:
    dateformat: mm:ss.SSS
